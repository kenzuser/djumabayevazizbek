<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Azizbek Djumabayev | Linktree</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    /* Asosiy sahifa sozlamalari */
    body { 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      margin: 0; 
      padding: 0; 
      background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%); /* Zamonaviy gradient fon */
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    /* Markaziy karta */
    .container {
      text-align: center;
      background: rgba(30, 41, 59, 0.7);
      padding: 40px 30px;
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px); /* Orqa fonni xiralashtirish effekti */
      width: 90%;
      max-width: 400px;
    }

    /* Profil rasmi uchun joy (agar keyinchalik rasm qo'ymoqchi bo'lsangiz) */
    .profile-img {
      width: 100px;
      height: 100px;
      background: linear-gradient(45deg, #38bdf8, #818cf8);
      border-radius: 50%;
      margin: 0 auto 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 40px;
      font-weight: bold;
      color: white;
    }

    h1 {
      margin: 0 0 5px 0;
      font-size: 1.8rem;
      letter-spacing: -0.5px;
    }

    .description {
      color: #94a3b8;
      margin-bottom: 30px;
      font-size: 0.95rem;
    }

    /* Tugmalar uchun umumiy uslub */
    .link-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 16px;
      margin-bottom: 16px;
      text-decoration: none;
      color: #fff;
      border-radius: 12px;
      font-weight: 600;
      font-size: 16px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      width: 100%;
      box-sizing: border-box;
    }

    .link-btn:hover {
      transform: translateY(-2px);
      filter: brightness(1.1);
    }

    /* Instagram tugmasi */
    .instagram {
      background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
      box-shadow: 0 4px 15px rgba(220, 39, 67, 0.3);
    }

    /* Telegram tugmasi */
    .telegram {
      background: #0088cc;
      box-shadow: 0 4px 15px rgba(0, 136, 204, 0.3);
    }

    .link-btn i {
      font-size: 20px;
    }

    /* Sayt pastidagi belgi */
    .footer {
      margin-top: 20px;
      font-size: 0.8rem;
      color: #64748b;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="profile-img">AD</div>
    <h1>Azizbek Djumabayev</h1>
    <p class="description">Dasturchi | Aloqa uchun linklar</p>
    
    <a href="https://www.instagram.com/djjumabayev" 
       class="link-btn instagram" 
       target="_blank" 
       rel="noopener noreferrer">
      <i class="fab fa-instagram"></i>
      Instagram
    </a>

    <a href="https://t.me/djumabayev" 
       class="link-btn telegram" 
       target="_blank" 
       rel="noopener noreferrer">
      <i class="fab fa-telegram-plane"></i>
      Telegram
    </a>

    <div class="footer">
      © 2026 azizbekdjumabayev.dev
    </div>
  </div>

</body>
</html>
