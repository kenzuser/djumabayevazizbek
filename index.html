<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Azizbek Djumabayev | Instagram</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    /* Umumiy sahifa stillari */
    body { 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      margin: 0; 
      padding: 0; 
      background-color: #121212; /* To'q fon */
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh; /* Sahifa balandligi bo'yicha markazlash */
    }

    /* Asosiy konteyner */
    .container {
      text-align: center;
      background: #1e1e1e;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      border: 1px solid #333;
    }

    /* Profil sarlavhasi */
    h1 {
      margin-bottom: 10px;
      font-size: 2rem;
    }

    p {
      color: #aaa;
      margin-bottom: 30px;
    }

    /* Instagram tugmasi stillari */
    .instagram-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 15px 30px;
      background: #E4405F; /* Instagram rasmiy rangi */
      color: #fff;
      text-decoration: none;
      border-radius: 50px;
      font-weight: bold;
      font-size: 18px;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(228, 64, 95, 0.4);
    }

    /* Sichqoncha ustiga kelgandagi effekt */
    .instagram-btn:hover {
      background: #d62e4c;
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(228, 64, 95, 0.6);
    }

    /* Ikonka o'lchami */
    .instagram-btn i {
      font-size: 24px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Azizbek Djumabayev</h1>
    <p>Mening rasmiy Instagram profilim</p>
    
    <a href="https://www.instagram.com/djjumabayev?igsh=N2JhcGF3Y2NhcDZt&utm_source=qr" 
       class="instagram-btn" 
       target="_blank" 
       rel="noopener noreferrer"
       title="Instagramda kuzatish">
      <i class="fab fa-instagram"></i>
      Obuna bo'lish
    </a>
  </div>

</body>
</html>
